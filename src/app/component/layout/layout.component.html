<app-home id="home"></app-home>

<header class="nav-wrapper" [class.scrolled]="isScrolled" role="banner">
  <nav class="nav-inner" aria-label="Main navigation">
    <a class="nav-brand" href="#home" (click)="scrollTo($event, 'home')">
      &lt;<span>DGR</span> /&gt;
    </a>

    <button class="nav-toggle" [class.open]="isMenuOpen" (click)="toggleMenu()" aria-label="Toggle navigation" [attr.aria-expanded]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-links" [class.open]="isMenuOpen">
      <a href="#home" (click)="scrollTo($event, 'home')" [class.active]="activeSection === 'home'">Home</a>
      <a href="#overview" (click)="scrollTo($event, 'overview')" [class.active]="activeSection === 'overview'">Services</a>
      <a href="#about" (click)="scrollTo($event, 'about')" [class.active]="activeSection === 'about'">About</a>
      <a href="#skills" (click)="scrollTo($event, 'skills')" [class.active]="activeSection === 'skills'">Skills</a>
      <a href="#resume" (click)="scrollTo($event, 'resume')" [class.active]="activeSection === 'resume'">Resume</a>
      <a href="#contact" (click)="scrollTo($event, 'contact')" [class.active]="activeSection === 'contact'">Contact</a>
    </div>
  </nav>
</header>

<app-overview id="overview"></app-overview>
<app-about id="about"></app-about>
<app-skills id="skills"></app-skills>
<app-resume id="resume"></app-resume>
<app-contact id="contact"></app-contact>

<!-- Biker easter egg — cartoon Dileep on bobber -->
@if (walkerVisible) {
  <div class="biker"
    [class.biker-boost]="walkerRunning"
    [style.left.px]="walkerX"
    [class.biker-flipped]="walkerFlipped"
    (click)="onWalkerClick()"
    title="Vroom!">
    <!-- Exhaust smoke (always while cruising) -->
    @if (!walkerRunning) {
      <div class="exhaust-smoke">
        <div class="smoke-puff smoke-puff-1"></div>
        <div class="smoke-puff smoke-puff-2"></div>
        <div class="smoke-puff smoke-puff-3"></div>
      </div>
    }
    <!-- Boost smoke burst (on click) -->
    @if (walkerRunning) {
      <div class="boost-smoke">
        <div class="burst-puff burst-1"></div>
        <div class="burst-puff burst-2"></div>
        <div class="burst-puff burst-3"></div>
        <div class="burst-puff burst-4"></div>
        <div class="burst-puff burst-5"></div>
        <div class="speed-line sl-1"></div>
        <div class="speed-line sl-2"></div>
        <div class="speed-line sl-3"></div>
      </div>
    }
    <svg class="biker-svg" viewBox="0 0 100 70" width="90" height="63">
      <defs>
        <radialGradient id="tankShine" cx="35%" cy="30%">
          <stop offset="0%" stop-color="#fff"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <!-- Dual exhaust pipes (Harley style) -->
      <path d="M40 48 L24 52 Q14 55 6 60" fill="none" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 46 L26 48 Q16 50 8 56" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="5" cy="61" rx="2" ry="1.5" fill="#bbb"/>
      <ellipse cx="7" cy="57" rx="2" ry="1.5" fill="#bbb"/>
      <!-- Rear wheel -->
      <g class="wheel wheel-rear">
        <circle cx="18" cy="55" r="12" fill="#111"/>
        <circle cx="18" cy="55" r="12" fill="none" stroke="#333" stroke-width="4.5"/>
        <circle cx="18" cy="55" r="7" fill="none" stroke="#444" stroke-width="0.8"/>
        <circle cx="18" cy="55" r="2" fill="#666"/>
        <line x1="18" y1="44" x2="18" y2="66" stroke="#555" stroke-width="0.5"/>
        <line x1="7" y1="55" x2="29" y2="55" stroke="#555" stroke-width="0.5"/>
        <line x1="11" y1="48" x2="25" y2="62" stroke="#555" stroke-width="0.4"/>
        <line x1="25" y1="48" x2="11" y2="62" stroke="#555" stroke-width="0.4"/>
      </g>
      <!-- Front wheel -->
      <g class="wheel wheel-front">
        <circle cx="78" cy="55" r="11" fill="#111"/>
        <circle cx="78" cy="55" r="11" fill="none" stroke="#333" stroke-width="4"/>
        <circle cx="78" cy="55" r="6.5" fill="none" stroke="#444" stroke-width="0.8"/>
        <circle cx="78" cy="55" r="2" fill="#666"/>
        <line x1="78" y1="45" x2="78" y2="65" stroke="#555" stroke-width="0.5"/>
        <line x1="68" y1="55" x2="88" y2="55" stroke="#555" stroke-width="0.5"/>
        <line x1="72" y1="49" x2="84" y2="61" stroke="#555" stroke-width="0.4"/>
        <line x1="84" y1="49" x2="72" y2="61" stroke="#555" stroke-width="0.4"/>
      </g>
      <!-- Frame -->
      <path d="M18 55 L26 40 L42 34 L58 30 L70 34 L78 46"
        fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="18" y1="55" x2="34" y2="34" stroke="#1a1a1a" stroke-width="2"/>
      <!-- Fuel tank (on top, above engine) -->
      <ellipse cx="56" cy="25" rx="8" ry="4" fill="#c0392b"/>
      <ellipse cx="56" cy="25" rx="8" ry="4" fill="url(#tankShine)" opacity="0.2"/>
      <path d="M49 25 Q56 22 63 25" fill="none" stroke="#e74c3c" stroke-width="0.8"/>
      <!-- BIG V-twin engine (below tank, forward) -->
      <rect x="44" y="42" width="22" height="10" rx="2" fill="#333"/>
      <path d="M46 42 L48 34 L53 34 L55 42" fill="#444" stroke="#555" stroke-width="0.5"/>
      <path d="M55 42 L57 34 L62 34 L64 42" fill="#3a3a3a" stroke="#555" stroke-width="0.5"/>
      <line x1="47" y1="40" x2="54" y2="40" stroke="#666" stroke-width="0.6"/>
      <line x1="47.5" y1="38" x2="53.5" y2="38" stroke="#666" stroke-width="0.6"/>
      <line x1="48" y1="36" x2="53" y2="36" stroke="#666" stroke-width="0.6"/>
      <line x1="56" y1="40" x2="63" y2="40" stroke="#666" stroke-width="0.6"/>
      <line x1="56.5" y1="38" x2="62.5" y2="38" stroke="#666" stroke-width="0.6"/>
      <line x1="57" y1="36" x2="62" y2="36" stroke="#666" stroke-width="0.6"/>
      <circle cx="55" cy="44" r="3.5" fill="#2a2a2a" stroke="#444" stroke-width="0.6"/>
      <circle cx="55" cy="44" r="1.5" fill="#555"/>
      <ellipse cx="54" cy="51" rx="6" ry="2" fill="#2a2a2a"/>
      <!-- Solo seat -->
      <path d="M42 32 Q46 28 54 29 L53 32 Q47 30 43 34Z" fill="#2c1a0e"/>
      <!-- Front fork -->
      <line x1="70" y1="32" x2="78" y2="46" stroke="#888" stroke-width="2.5"/>
      <line x1="72" y1="32" x2="80" y2="46" stroke="#777" stroke-width="1.5"/>
      <rect x="68" y="30" width="5" height="3" rx="1" fill="#555"/>
      <!-- Handlebars -->
      <path d="M68 32 L65 24 L64 21" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      <path d="M73 32 L76 25 L77 22" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      <rect x="61" y="19" width="4" height="3" rx="1" fill="#222"/>
      <rect x="75" y="20" width="4" height="3" rx="1" fill="#222"/>
      <!-- Headlight (on fork) -->
      <circle cx="80" cy="38" r="3.5" fill="#222" stroke="#444" stroke-width="0.6"/>
      <circle cx="80" cy="38" r="2.2" fill="#ffd700" opacity="0.8"/>
      <!-- Rear fender + tail light -->
      <path d="M5 50 Q12 44 24 47" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <circle cx="4" cy="49" r="1.5" fill="#ff2222"/>
      <!-- Forward controls (foot peg) -->
      <rect x="52" y="51" width="5" height="1.2" rx="0.5" fill="#555"/>
      <!-- === RIDER — RELAXED, LEANING BACK === -->
      <!-- Far leg (extended forward to pegs) -->
      <path d="M48 34 L52 42 L54 50 L53 53" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M50 51 L56 51 L57 55 L49 55Z" fill="#1a1a1a"/>
      <!-- Near leg -->
      <path d="M44 34 L48 42 L50 50 L50 53" fill="none" stroke="#2a2a2a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M47 51 L53 51 L54 55 L46 55Z" fill="#1a1a1a"/>
      <line x1="48" y1="53" x2="53" y2="53" stroke="#333" stroke-width="0.3"/>
      <!-- Torso — upright / slightly leaning BACK -->
      <path d="M48 34 L46 20 L42 14 L36 17 L38 28 L44 34Z" fill="#3d3d3d"/>
      <path d="M40 17 L42 20 L44 17" fill="#4a4a4a" stroke="#555" stroke-width="0.4"/>
      <!-- Arms reaching far FORWARD to handlebars -->
      <path d="M44 18 L56 19 L66 20 L76 21" fill="none" stroke="#3d3d3d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="76" cy="21" r="1.4" fill="#c68642"/>
      <path d="M42 19 L54 20 L63 22" fill="none" stroke="#3d3d3d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="63" cy="22" r="1.2" fill="#c68642"/>
      <!-- Head — above shoulders, facing RIGHT -->
      <ellipse cx="42" cy="8" rx="5.5" ry="5.5" fill="#c68642"/>
      <!-- Nose pointing RIGHT -->
      <path d="M47 8 L48.5 9 L47 10" fill="#b5733a"/>
      <!-- Hair -->
    <path d="M36.5 6 Q37 3 39 2 Q41 1 43 1 Q45 1 46.5 2.5 Q47.5 4 47 6
             L46.5 4 Q45.5 2.5 43 2.2 Q40 2.5 37.5 4.5Z" fill="#1c1c1c"/>
      <rect x="36.5" y="3.5" width="1.2" height="2.5" rx="0.4" fill="#2a2a2a"/>
      <rect x="46" y="3.5" width="1.2" height="2.5" rx="0.4" fill="#2a2a2a"/>
      <!-- Sunglasses -->
      <rect x="37" y="5.5" width="4.5" height="2.8" rx="0.8" fill="#111" stroke="#444" stroke-width="0.3"/>
      <rect x="42.5" y="5.5" width="4.5" height="2.8" rx="0.8" fill="#111" stroke="#444" stroke-width="0.3"/>
      <line x1="41.5" y1="6.7" x2="42.5" y2="6.7" stroke="#444" stroke-width="0.4"/>
      <!-- Beard -->
      <path d="M39 11 Q41 13.5 42.5 14 Q44 13.5 46 11 Q44.5 13 42.5 13.5 Q40.5 13 39 11Z" fill="#2c2c2c"/>
    </svg>
  </div>
}
