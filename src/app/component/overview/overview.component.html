<section id="section-overview" class="section-dark section-padding" aria-labelledby="overview-heading">
  <div class="container">
    <div class="section-header" appScrollAnimate="fadeInUp">
      <h2 id="overview-heading">What I <span class="gradient-text">Do</span></h2>
      <p>Delivering end-to-end technology solutions across the full stack and cloud infrastructure</p>
    </div>

    <div class="services-grid">
      @for (service of services; track service; let i = $index) {
        <div
          class="service-card glassmorphism"
          appScrollAnimate="fadeInUp"
          [animateDelay]="i * 150">
          <div class="service-icon">
            <i [class]="service.icon"></i>
          </div>
          <h3>{{ service.title }}</h3>
          <p>{{ service.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
